version: '3.8'

# Development overrides for hot reload
services:
  backend:
    volumes:
      - ./app:/app/app:ro
      - ./scripts:/app/scripts:ro
    environment:
      - DEBUG=true
      - LOG_LEVEL=DEBUG
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload --log-level debug

  streamlit:
    volumes:
      - ./streamlit_app:/app/streamlit_app:ro
    environment:
      - STREAMLIT_SERVER_RUN_ON_SAVE=true
    command: streamlit run streamlit_app/Home.py --server.port 8501 --server.address 0.0.0.0 --server.runOnSave true

  scheduler:
    volumes:
      - ./app:/app/app:ro
    environment:
      - DEBUG=true
      - LOG_LEVEL=DEBUG